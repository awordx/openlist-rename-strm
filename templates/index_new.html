<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>openlist-rename-strm</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Source+Sans+3:wght@400;500;600&family=Noto+Serif+SC:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --page: #ffffff;
            --page-soft: rgba(255, 255, 255, 0.56);
            --panel: rgba(255, 255, 255, 0.52);
            --panel-soft: rgba(255, 255, 255, 0.62);
            --border: rgba(210, 202, 190, 0.6);
            --border-strong: rgba(201, 191, 177, 0.78);
            --text-main: #1f1c18;
            --text-sub: #736b61;
            --accent: #6f7b69;
            --accent-2: #b08568;
            --danger: #a97064;
            --shadow: 0 18px 38px rgba(42, 32, 24, 0.08);
            --glass-blur: blur(16px) saturate(145%);
            --glass-blur-soft: blur(10px) saturate(130%);
        }

        * {
            box-sizing: border-box;
        }

        html {
            scrollbar-gutter: stable;
        }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--text-main);
            font-family: "Source Sans 3", "Microsoft YaHei UI", sans-serif;
            {% if bg_image %}
            background-image:
                linear-gradient(140deg, rgba(255, 255, 255, 0.24), rgba(252, 246, 236, 0.2) 46%, rgba(241, 249, 255, 0.018)),
                url("/static/backgrounds/{{ bg_image }}");
            {% else %}
            background-image:
                radial-gradient(circle at 18% 22%, rgba(255, 255, 255, 0.96), rgba(255, 255, 255, 0.82) 36%, rgba(252, 249, 244, 0.82) 64%, rgba(249, 247, 243, 0.9) 100%),
                linear-gradient(180deg, rgba(248, 244, 237, 0.72), rgba(255, 255, 255, 0.54) 220px, rgba(255, 255, 255, 0.9));
            {% endif %}
            background-color: var(--page);
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            {% if bg_image %}
            display: none;
            {% endif %}
            background:
                linear-gradient(90deg, rgba(0, 0, 0, 0.018), transparent 9%, transparent 91%, rgba(0, 0, 0, 0.018)),
                repeating-linear-gradient(
                    0deg,
                    rgba(0, 0, 0, 0.01) 0,
                    rgba(0, 0, 0, 0.01) 1px,
                    transparent 1px,
                    transparent 6px
                );
            opacity: 0.3;
        }

        .app {
            position: relative;
            z-index: 1;
            max-width: 1600px;
            margin: 0 auto;
            padding: 34px 24px 28px;
        }

        .topbar {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .brand {
            display: grid;
            gap: 6px;
        }

        .brand h1 {
            margin: 0;
            color: var(--text-main);
            font-family: "Cormorant Garamond", "Noto Serif SC", serif;
            font-size: clamp(42px, 5vw, 70px);
            font-weight: 600;
            line-height: 0.92;
        }

        .brand p {
            margin: 0;
            color: var(--text-sub);
            font-family: "Noto Serif SC", serif;
            font-size: 14px;
            letter-spacing: 0.04em;
        }

        .version-pill {
            border: 1px solid var(--border);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.5);
            padding: 8px 14px;
            color: var(--text-sub);
            font-size: 13px;
            white-space: nowrap;
            box-shadow: 0 8px 24px rgba(42, 32, 24, 0.04);
            backdrop-filter: var(--glass-blur-soft);
            -webkit-backdrop-filter: var(--glass-blur-soft);
        }

        #version-number {
            color: var(--text-main);
            font-weight: 600;
        }

        .toolbar {
            display: grid;
            grid-template-columns: repeat(4, minmax(132px, 1fr));
            gap: 12px;
            margin-bottom: 18px;
        }

        .btn {
            min-height: 46px;
            border: 1px solid var(--border-strong);
            border-radius: 8px;
            color: var(--text-main);
            background: linear-gradient(150deg, rgba(255, 255, 255, 0.62), rgba(255, 255, 255, 0.38));
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 9px;
            font-family: "Source Sans 3", sans-serif;
            font-size: 14px;
            font-weight: 600;
            transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
            box-shadow: 0 4px 12px rgba(32, 23, 16, 0.09), inset 0 1px 0 rgba(255, 255, 255, 0.45);
            backdrop-filter: var(--glass-blur-soft);
            -webkit-backdrop-filter: var(--glass-blur-soft);
        }

        .btn:hover {
            transform: translateY(-1px);
            border-color: rgba(181, 168, 152, 0.9);
            box-shadow: 0 14px 26px rgba(42, 32, 24, 0.12), inset 0 1px 0 rgba(255, 255, 255, 0.65);
        }

        .btn:active {
            transform: translateY(0);
        }

<!--        .btn.run {-->
<!--            background: rgba(111, 123, 105, 0.09);-->
<!--            border-color: rgba(111, 123, 105, 0.35);-->
<!--            color: #53604f;-->
<!--        }-->

<!--        .btn.stop {-->
<!--            background: rgba(169, 112, 100, 0.08);-->
<!--            border-color: rgba(169, 112, 100, 0.28);-->
<!--            color: #8d6458;-->
<!--        }-->

<!--        .btn.muted {-->
<!--            background: rgba(141, 132, 122, 0.08);-->
<!--            border-color: rgba(141, 132, 122, 0.22);-->
<!--            color: #6f675f;-->
<!--        }-->

        .btn:hover {
            border-color: var(--accent); /* 悬停时边框颜色变为深色 */
            background: var(--page-soft); /* 悬停时稍微变灰一点点 */
        }

        .btn.run {
            background: linear-gradient(150deg, rgba(111, 123, 105, 0.26), rgba(255, 255, 255, 0.34));
            border-color: rgba(111, 123, 105, 0.42);
            color: #4c5a47;
        }

        .btn.stop {
            background: linear-gradient(150deg, rgba(169, 112, 100, 0.22), rgba(255, 255, 255, 0.34));
            border-color: rgba(169, 112, 100, 0.42);
            color: #845a4f;
        }

        .btn.muted {
            background: linear-gradient(150deg, rgba(141, 132, 122, 0.2), rgba(255, 255, 255, 0.34));
            border-color: rgba(141, 132, 122, 0.34);
            color: #665f58;
        }

        .layout {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 350px;
            gap: 18px;
            align-items: start;
        }

        .panel {
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--panel);
            box-shadow: var(--shadow);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
        }

        .panel-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: "Noto Serif SC", serif;
            font-size: 15px;
            font-weight: 600;
            color: var(--text-main);
        }

        .panel-title svg {
            width: 16px;
            height: 16px;
            color: var(--text-sub);
        }

        #output {
            height: min(56vh, 520px);
            min-height: 320px;
            overflow-y: auto;
            padding: 18px;
            font-family: "Consolas", "Courier New", monospace;
            font-size: 13px;
            line-height: 1.68;
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.04);
            border-top: 1px solid rgba(255, 255, 255, 0.24);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(10px) saturate(130%);
            -webkit-backdrop-filter: blur(10px) saturate(130%);
        }

        #log {
            white-space: pre-wrap;
            word-break: break-word;
        }

        .log-line {
            opacity: 0;
            transform: translateY(6px);
            animation: fadeInUp 0.3s forwards;
            margin: 2px 0;
            color: #302b25;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .aside {
            display: grid;
            gap: 16px;
            align-content: start;
        }

        .stat-content,
        .filesize-content {
            padding: 16px 18px 18px;
            font-size: 14px;
            color: var(--text-sub);
            line-height: 1.85;
        }

        #statsContent b {
            color: var(--text-main);
        }

        #filesize-list {
            display: grid;
            gap: 8px;
            max-height: 46vh;
            overflow-y: auto;
            padding-right: 4px;
        }

        .size-item {
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--panel-soft);
            padding: 10px 12px;
            display: flex;
            justify-content: space-between;
            gap: 12px;
            font-size: 13px;
            align-items: baseline;
            backdrop-filter: var(--glass-blur-soft);
            -webkit-backdrop-filter: var(--glass-blur-soft);
        }

        .size-name {
            color: var(--text-main);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
        }

        .size-value {
            color: var(--accent);
            font-weight: 600;
            white-space: nowrap;
        }

        .dock {
            margin-top: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .dock-link {
            border: 1px solid var(--border);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.48);
            color: var(--text-sub);
            text-decoration: none;
            padding: 10px 14px;
            display: inline-flex;
            align-items: center;
            gap: 9px;
            font-size: 13px;
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: transform 0.18s ease, box-shadow 0.18s ease;
            backdrop-filter: var(--glass-blur-soft);
            -webkit-backdrop-filter: var(--glass-blur-soft);
        }

        .dock-link:hover {
            transform: translateY(-1px);
            box-shadow: 0 12px 26px rgba(42, 32, 24, 0.06);
        }

        .dock-link svg {
            width: 16px;
            height: 16px;
            color: var(--text-sub);
        }

        #toast {
            visibility: hidden;
            min-width: 220px;
            max-width: min(88vw, 380px);
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.62);
            color: var(--text-main);
            text-align: center;
            border-radius: 8px;
            padding: 12px 16px;
            position: fixed;
            top: 18px;
            right: 18px;
            z-index: 9999;
            font-size: 13px;
            box-shadow: 0 16px 30px rgba(42, 32, 24, 0.08);
            opacity: 0;
            transform: translateY(-10px);
            transition: opacity 0.25s ease, transform 0.25s ease;
            backdrop-filter: var(--glass-blur-soft);
            -webkit-backdrop-filter: var(--glass-blur-soft);
        }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(245, 241, 236, 0.5);
            backdrop-filter: blur(6px);
            z-index: 9998;
        }

        .modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: min(920px, 94vw);
            max-height: 86vh;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.54);
            box-shadow: 0 24px 54px rgba(42, 32, 24, 0.1);
            z-index: 10000;
            overflow: hidden;
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
        }

        .modal-head {
            padding: 18px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .modal-title {
            margin: 0;
            color: var(--text-main);
            font-family: "Cormorant Garamond", "Noto Serif SC", serif;
            font-size: 30px;
            font-weight: 600;
            line-height: 1;
        }

        .modal-body {
            padding: 18px 20px;
            overflow-y: auto;
            max-height: calc(86vh - 140px);
        }

        .modal-foot {
            border-top: 1px solid var(--border);
            padding: 14px 20px 18px;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            background: rgba(255, 255, 255, 0.42);
            backdrop-filter: var(--glass-blur-soft);
            -webkit-backdrop-filter: var(--glass-blur-soft);
        }

        .config-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px 18px;
        }

        .field {
            display: grid;
            gap: 6px;
        }

        .field-full {
            grid-column: 1 / -1;
        }

        .field label {
            font-size: 13px;
            color: var(--text-sub);
            line-height: 1.5;
        }

        .glass-input,
        .sglass-input {
            width: 100%;
            height: 42px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.38);
            color: var(--text-main);
            padding: 0 12px;
            outline: none;
            font-family: "Source Sans 3", sans-serif;
            font-size: 14px;
            transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
            backdrop-filter: var(--glass-blur-soft);
            -webkit-backdrop-filter: var(--glass-blur-soft);
        }

        .glass-input:focus,
        .sglass-input:focus {
            border-color: rgba(111, 123, 105, 0.45);
            box-shadow: 0 0 0 3px rgba(111, 123, 105, 0.08);
            background: #fff;
        }

        #infoModal .modal-body {
            font-size: 14px;
            color: var(--text-sub);
            line-height: 1.85;
        }

        #infoModal ul {
            margin: 0;
            padding-left: 18px;
        }

        #infoModal li + li {
            margin-top: 8px;
        }

        @media (max-width: 1220px) {
            .layout {
                grid-template-columns: 1fr;
            }

            .aside {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            #output {
                height: 58vh;
                min-height: 360px;
            }
        }

        @media (max-width: 900px) {
            .app {
                padding: 28px 16px 20px;
            }

            .toolbar {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .config-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 640px) {
            .brand h1 {
                font-size: 42px;
            }

            .aside {
                grid-template-columns: 1fr;
            }

            .dock {
                flex-direction: column;
            }

            .dock-link {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
<div class="app">
    <header class="topbar">
        <div class="brand">
            <h1>openlist-rename-strm</h1>
            <p>媒体重命名与 .strm 自动化控制台</p>
        </div>
        <div class="version-pill" id="version-info">版本 <span id="version-number">Beta 4.9.1</span></div>
    </header>

    <section class="toolbar">
        <button class="btn run" onclick="runFile()"><i data-lucide="play"></i><span>运行刷新</span></button>
        <button class="btn stop" onclick="stopFile()"><i data-lucide="square"></i><span>停止刷新</span></button>
        <button class="btn muted" onclick="clearLog()"><i data-lucide="eraser"></i><span>清空日志</span></button>
        <button class="btn" onclick="openConfig()"><i data-lucide="settings-2"></i><span>相关设置</span></button>
    </section>

    <section class="layout">
        <article class="panel">
            <div class="panel-header">
                <div class="panel-title"><i data-lucide="scroll-text"></i><span>日志输出</span></div>
                <span style="font-size:12px;color:#9fbedb;">/log_stream</span>
            </div>
            <div id="output">
                <div id="log"></div>
            </div>
        </article>

        <aside class="aside">
            <div id="statsBox" class="panel">
                <div class="panel-header">
                    <div class="panel-title"><i data-lucide="bar-chart-3"></i><span>资源统计</span></div>
                </div>
                <div class="stat-content" id="statsContent">加载中...</div>
            </div>

            <div id="filesize-container" class="panel">
                <div class="panel-header">
                    <div class="panel-title"><i data-lucide="sparkles"></i><span>最近新增</span></div>
                </div>
                <div class="filesize-content">
                    <div id="filesize-list"></div>
                </div>
            </div>

            <div class="dock">
                <a class="dock-link" id="github-link" onclick="window.open('https://github.com/awordx/openlist-rename-strm', '_blank')">
                    <i data-lucide="github"></i><span>GitHub</span>
                </a>
                <a class="dock-link" id="info-button" onclick="openInfoModal()">
                    <i data-lucide="info"></i><span>使用说明</span>
                </a>
            </div>
        </aside>
    </section>
</div>

<div id="toast"></div>

<div id="modalOverlay" class="modal-overlay"></div>
<div id="configModal" class="modal">
    <div class="modal-head">
        <h3 class="modal-title">配置中心</h3>
        <button type="button" class="btn muted" style="height:34px;padding:0 12px;" onclick="closeConfig()">
            <i data-lucide="x"></i>
        </button>
    </div>
    <div class="modal-body">
        <form id="configForm" class="config-grid">
            <div class="field field-full">
                <label for="alist_url">* Openlist 地址（例如 http://ip:5244）</label>
                <input type="text" id="alist_url" class="glass-input">
            </div>
            <div class="field field-full">
                <label for="alist_apikey">* Openlist API Token</label>
                <input type="text" id="alist_apikey" class="glass-input">
            </div>
            <div class="field field-full">
                <label for="alist_password">* Openlist 账号密码</label>
                <input type="text" id="alist_password" class="glass-input">
            </div>

            <div class="field">
                <label for="movies">* 电影监控路径（英文逗号分隔）</label>
                <input type="text" id="movies" class="glass-input">
            </div>
            <div class="field">
                <label for="series">* 剧集监控路径（英文逗号分隔）</label>
                <input type="text" id="series" class="glass-input">
            </div>

            <div class="field">
                <label for="use_emby_refresh">生成 strm 后自动刷新 Emby</label>
                <select id="use_emby_refresh" class="sglass-input">
                    <option value="True">True</option>
                    <option value="False">False</option>
                </select>
            </div>
            <div class="field">
                <label for="iyuu_token">IYUU Token（不通知填 None）</label>
                <input type="text" id="iyuu_token" class="glass-input">
            </div>

            <div class="field">
                <label for="emby_url">Emby 地址（例如 http://ip:8096）</label>
                <input type="text" id="emby_url" class="glass-input">
            </div>
            <div class="field">
                <label for="api_key">Emby API Key</label>
                <input type="text" id="api_key" class="glass-input">
            </div>

            <div class="field">
                <label for="library_movie_new">电影媒体库名称</label>
                <input type="text" id="library_movie_new" class="glass-input">
            </div>
            <div class="field">
                <label for="library_anime_new">动漫媒体库名称</label>
                <input type="text" id="library_anime_new" class="glass-input">
            </div>
            <div class="field field-full">
                <label for="library_series">剧集媒体库名称</label>
                <input type="text" id="library_series" class="glass-input">
            </div>

            <div class="field">
                <label for="use_library">开启海报墙</label>
                <select id="use_library" class="sglass-input">
                    <option value="True">True</option>
                    <option value="False">False</option>
                </select>
            </div>
            <div class="field">
                <label for="cron">海报墙定时刷新 Cron</label>
                <input type="text" id="cron" class="glass-input">
            </div>

            <div class="field">
                <label for="is_use_ai">启用 AI 命名</label>
                <select id="is_use_ai" class="sglass-input">
                    <option value="True">True</option>
                    <option value="False">False</option>
                </select>
            </div>
            <div class="field">
                <label for="use_ai_title">AI 标题重命名</label>
                <select id="use_ai_title" class="sglass-input">
                    <option value="True">True</option>
                    <option value="False">False</option>
                </select>
            </div>

            <div class="field field-full">
                <label for="chat_api">Chat API Key（不使用 AI 可填 None）</label>
                <input type="text" id="chat_api" class="glass-input">
            </div>

            <div class="field">
                <label for="is_use_asyncio">使用异步操作</label>
                <select id="is_use_asyncio" class="sglass-input">
                    <option value="True">True</option>
                    <option value="False">False</option>
                </select>
            </div>
            <div class="field">
                <label for="restart_update">容器重启后更新已命名列表</label>
                <select id="restart_update" class="sglass-input">
                    <option value="True">True</option>
                    <option value="False">False</option>
                </select>
            </div>

            <div class="field">
                <label for="ai_confidence">AI 命名置信度</label>
                <input type="number" id="ai_confidence" min="0" max="100" step="1" class="glass-input">
            </div>
        </form>
    </div>
    <div class="modal-foot">
        <button type="button" class="btn run" style="height:36px;padding:0 14px;" onclick="saveConfig()">
            <i data-lucide="save"></i><span>保存</span>
        </button>
        <button type="button" class="btn stop" style="height:36px;padding:0 14px;" onclick="closeConfig()">
            <i data-lucide="x-circle"></i><span>关闭</span>
        </button>
    </div>
</div>

<div id="infoOverlay" class="modal-overlay"></div>
<div id="infoModal" class="modal" style="width:min(760px,94vw);">
    <div class="modal-head">
        <h3 class="modal-title">使用说明</h3>
        <button type="button" class="btn muted" style="height:34px;padding:0 12px;" onclick="closeInfoModal()">
            <i data-lucide="x"></i>
        </button>
    </div>
    <div class="modal-body">
        <ul>
            <li>可以直接访问 <code>http://ip:5050/stream</code> 快捷刷新。</li>
            <li>项目主页：<code>https://github.com/awordx/openlist-rename-strm</code>。</li>
            <li>如果点击刷新无响应，可以访问 <code>/stream</code> 检查日志。</li>
            <li>当 Openlist API 批量移动或删除文件较多时，可能会出现失败，建议重试刷新。</li>
        </ul>
    </div>
</div>

<script>
    if (window.lucide) {
        window.lucide.createIcons();
    }

    function openInfoModal() {
        document.getElementById("infoModal").style.display = "block";
        document.getElementById("infoOverlay").style.display = "block";
    }

    function closeInfoModal() {
        document.getElementById("infoModal").style.display = "none";
        document.getElementById("infoOverlay").style.display = "none";
    }

    function toggleBySelect(selectId, targetIds) {
        const select = document.getElementById(selectId);
        if (!select) {
            return;
        }

        const enabled = select.value === "True";
        targetIds.forEach((id) => {
            const el = document.getElementById(id);
            if (!el) {
                return;
            }
            el.disabled = !enabled;
            el.style.opacity = enabled ? "1" : "0.5";
        });
    }

    function updateAllOptions() {
        toggleBySelect("is_use_ai", ["use_ai_title", "chat_api"]);
        toggleBySelect("use_library", ["cron"]);
        toggleBySelect("use_emby_refresh", [
            "iyuu_token",
            "emby_url",
            "library_movie_new",
            "library_anime_new",
            "library_series",
            "api_key"
        ]);
    }

    document.addEventListener("DOMContentLoaded", () => {
        updateAllOptions();
        document.getElementById("is_use_ai")?.addEventListener("change", updateAllOptions);
        document.getElementById("use_library")?.addEventListener("change", updateAllOptions);
        document.getElementById("use_emby_refresh")?.addEventListener("change", updateAllOptions);
    });
</script>

<script>
    window.eventSource = null;

    function showToast(message, duration = 3000) {
        const toast = document.getElementById("toast");
        toast.textContent = message;
        toast.style.visibility = "visible";
        toast.style.opacity = "1";
        toast.style.transform = "translateY(0)";

        setTimeout(() => {
            toast.style.opacity = "0";
            toast.style.transform = "translateY(-10px)";
            setTimeout(() => {
                toast.style.visibility = "hidden";
            }, 250);
        }, duration);
    }

    function appendLog(text) {
        const logDiv = document.getElementById("log");
        const outputDiv = document.getElementById("output");
        const lineDiv = document.createElement("div");
        lineDiv.className = "log-line";
        lineDiv.textContent = text;
        logDiv.appendChild(lineDiv);
        requestAnimationFrame(() => {
            outputDiv.scrollTop = outputDiv.scrollHeight;
        });
    }

    function ensureLogStream() {
        if (window.eventSource && window.eventSource.readyState !== EventSource.CLOSED) {
            return;
        }

        try {
            const logDiv = document.getElementById("log");
            const outputDiv = document.getElementById("output");
            window.eventSource = new EventSource("/log_stream");

            window.eventSource.onmessage = function(event) {
                const lineDiv = document.createElement("div");
                lineDiv.className = "log-line";
                lineDiv.textContent = event.data;
                logDiv.appendChild(lineDiv);
                requestAnimationFrame(() => {
                    outputDiv.scrollTop = outputDiv.scrollHeight;
                });
            };

            window.eventSource.onerror = function(err) {
                console.log("日志流断开", err);
                if (window.eventSource) {
                    window.eventSource.close();
                    window.eventSource = null;
                }
                showToast("日志流已断开", 2000);
            };
        } catch (err) {
            console.error("无法创建日志连接:", err);
            showToast("无法连接日志流", 3000);
        }
    }

    function runFile() {
        appendLog("开始执行刷新任务...");
        fetch("/refresh", { method: "POST" })
            .then(response => response.text())
            .then(data => {
                showToast((data && data.trim()) ? data.trim() : "刷新已启动，请稍等片刻", 3000);
            })
            .catch(error => {
                console.error("刷新启动失败:", error);
                showToast("刷新启动失败", 3000);
            });
        ensureLogStream();
    }

    function stopFile() {
        fetch("/stop", { method: "POST" })
            .then(response => response.text())
            .then(data => showToast(data || "已发送停止请求", 3000))
            .catch(() => showToast("停止失败", 3000));
    }

    function clearLog() {
        document.getElementById("log").innerHTML = "";
        showToast("日志已清空", 2600);
    }

    async function openConfig() {
        const password = prompt("请输入配置密码：");
        if (!password) {
            return;
        }

        const response = await fetch("/check_config_password", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ password })
        });
        const result = await response.json();
        if (!result.valid) {
            alert("密码错误，无法打开配置");
            return;
        }

        document.getElementById("configModal").style.display = "block";
        document.getElementById("modalOverlay").style.display = "block";

        fetch("/get_config")
            .then(res => res.json())
            .then(data => {
                document.getElementById("alist_url").value = data.alist_url || "";
                document.getElementById("alist_apikey").value = data.alist_apikey || "";
                document.getElementById("alist_password").value = data.alist_password || "";

                document.getElementById("iyuu_token").value = data.iyuu_token || "";
                document.getElementById("emby_url").value = data.emby_url || "";
                document.getElementById("library_movie_new").value = data.library_movie_new || "";
                document.getElementById("library_anime_new").value = data.library_anime_new || "";
                document.getElementById("library_series").value = data.library_series || "";
                document.getElementById("api_key").value = data.api_key || "";

                document.getElementById("ai_confidence").value = data.ai_confidence || 0.8;
                document.getElementById("movies").value = data.movies || "";
                document.getElementById("series").value = data.series || "";
                document.getElementById("cron").value = data.cron || "";
                document.getElementById("chat_api").value = data.chat_api || "";

                document.getElementById("use_library").value = data.use_library || "True";
                document.getElementById("use_ai_title").value = data.use_ai_title || "True";
                document.getElementById("is_use_ai").value = data.is_use_ai || "True";
                document.getElementById("is_use_asyncio").value = data.is_use_asyncio || "True";
                document.getElementById("restart_update").value = data.restart_update || "True";
                document.getElementById("use_emby_refresh").value = data.use_emby_refresh || "True";
                updateAllOptions();
            });
    }

    function closeConfig() {
        document.getElementById("configModal").style.display = "none";
        document.getElementById("modalOverlay").style.display = "none";
    }

    function saveConfig() {
        const data = {
            alist_url: document.getElementById("alist_url").value,
            alist_apikey: document.getElementById("alist_apikey").value,
            alist_password: document.getElementById("alist_password").value,

            ai_confidence: parseFloat(document.getElementById("ai_confidence").value),
            movies: document.getElementById("movies").value,
            series: document.getElementById("series").value,
            cron: document.getElementById("cron").value,
            use_library: document.getElementById("use_library").value,

            emby_url: document.getElementById("emby_url").value,
            library_movie_new: document.getElementById("library_movie_new").value,
            library_anime_new: document.getElementById("library_anime_new").value,
            library_series: document.getElementById("library_series").value,
            api_key: document.getElementById("api_key").value,
            iyuu_token: document.getElementById("iyuu_token").value,

            use_ai_title: document.getElementById("use_ai_title").value,
            is_use_ai: document.getElementById("is_use_ai").value,
            is_use_asyncio: document.getElementById("is_use_asyncio").value,
            restart_update: document.getElementById("restart_update").value,
            use_emby_refresh: document.getElementById("use_emby_refresh").value,

            chat_api: document.getElementById("chat_api").value
        };

        fetch("/save_config", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data)
        })
            .then(res => res.text())
            .then(msg => {
                showToast(msg || "配置已保存", 2200);
                closeConfig();
            })
            .catch(err => {
                console.error(err);
                showToast("保存失败", 2200);
            });
    }

    function loadStats() {
        fetch("/get_stats")
            .then(res => res.json())
            .then(data => {
                document.getElementById("statsContent").innerHTML = `
                    电影总数：<b>${data.movies}</b><br>
                    剧集总数：<b>${data.series_count}</b>
                `;
            })
            .catch(err => {
                console.error(err);
                document.getElementById("statsContent").innerText = "统计信息获取失败";
            });
    }

    function updateFilesize() {
        fetch("/get_filesize")
            .then(res => res.json())
            .then(data => {
                const container = document.getElementById("filesize-list");
                container.innerHTML = "";
                Object.entries(data).forEach(([name, size]) => {
                    const sizeText = size === "-" ? "-" : `${size} GB`;
                    const item = document.createElement("div");
                    item.className = "size-item";

                    const title = document.createElement("span");
                    title.className = "size-name";
                    title.textContent = name;

                    const value = document.createElement("span");
                    value.className = "size-value";
                    value.textContent = sizeText;

                    item.appendChild(title);
                    item.appendChild(value);
                    container.appendChild(item);
                });
            })
            .catch(err => console.error(err));
    }

    window.addEventListener("load", () => {
        loadStats();
        updateFilesize();
        setInterval(updateFilesize, 10000);
        ensureLogStream();
    });
</script>
</body>
</html>
